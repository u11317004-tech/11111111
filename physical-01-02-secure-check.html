<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>01-02 環境檢查</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>body { font-family: Inter, sans-serif; }</style>
  </head>
  <body class="min-h-screen bg-slate-950 p-6 text-slate-100">
    <a class="text-cyan-400 hover:text-lime-400" href="index.html">← 返回課程表</a>

    <div id="safe-ui" class="mx-auto mt-8 max-w-lg hidden">
      <h1 class="text-xl font-semibold text-lime-400">安全環境</h1>
      <p class="mt-2 text-slate-400">
        <code class="text-cyan-300">window.isSecureContext</code> 為 true，可正常使用相機／麥克風等 API。
      </p>
    </div>

    <div
      id="unsafe-overlay"
      class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/90 p-6"
    >
      <p class="max-w-2xl text-center text-3xl font-bold leading-relaxed text-red-400 sm:text-4xl">
        此 API 僅支援 HTTPS 或 Localhost 安全環境
      </p>
    </div>

    <script>
      const safeUi = document.getElementById("safe-ui");
      const unsafe = document.getElementById("unsafe-overlay");
      if (window.isSecureContext) {
        safeUi.classList.remove("hidden");
      } else {
        unsafe.classList.remove("hidden");
        unsafe.classList.add("flex");
      }
    </script>
  </body>
</html>
