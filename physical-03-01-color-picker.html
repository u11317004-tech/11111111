<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>03-01 數位吸管</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>body { font-family: Inter, sans-serif; }</style>
  </head>
  <body class="min-h-screen bg-slate-950 p-6 text-slate-100">
    <a class="text-cyan-400 hover:text-lime-400" href="index.html">← 返回課程表</a>
    <div class="mx-auto mt-6 max-w-3xl">
      <h1 class="mb-4 text-xl font-semibold">練習 03-01｜數位吸管</h1>
      <button id="start" class="mb-4 rounded-xl border border-cyan-400/50 bg-cyan-500/10 px-4 py-2 text-sm text-cyan-200">
        開啟攝影機
      </button>
      <div class="relative inline-block max-w-full">
        <video id="video" class="hidden" playsinline muted></video>
        <canvas id="canvas" class="max-h-[70vh] cursor-crosshair rounded-lg border border-cyan-500/30 bg-black"></canvas>
      </div>
      <p class="mt-4 font-mono text-sm">
        點擊畫布取色 — R: <span id="r" class="text-red-400">—</span> G:
        <span id="g" class="text-green-400">—</span> B: <span id="b" class="text-blue-400">—</span>
      </p>
      <p class="mt-1 text-xs text-slate-500">索引公式：(y × width + x) × 4 → R,G,B 位元組</p>
    </div>
    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const rEl = document.getElementById("r");
      const gEl = document.getElementById("g");
      const bEl = document.getElementById("b");

      function drawFrame() {
        if (!video.videoWidth) return;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        requestAnimationFrame(drawFrame);
      }

      document.getElementById("start").addEventListener("click", async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        await video.play();
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        drawFrame();
      });

      canvas.addEventListener("click", (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX);
        const y = Math.floor((e.clientY - rect.top) * scaleY);
        const w = canvas.width;
        const imageData = ctx.getImageData(0, 0, w, canvas.height);
        const data = imageData.data;
        const i = (y * w + x) * 4;
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        rEl.textContent = r;
        gEl.textContent = g;
        bEl.textContent = b;
        console.log("RGB at", x, y, r, g, b, "index", i);
      });
    </script>
  </body>
</html>
