<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>02-03 音量閥值顏色</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      body { font-family: Inter, sans-serif; transition: background-color 0.08s linear; }
    </style>
  </head>
  <body id="page" class="min-h-screen bg-green-900/50 p-6 text-slate-100">
    <a class="text-cyan-400 hover:text-lime-400" href="index.html">← 返回課程表</a>
    <div class="mx-auto mt-8 max-w-lg">
      <h1 class="mb-4 text-xl font-semibold">練習 02-03｜即時環境監測</h1>
      <button
        id="start"
        class="mb-4 rounded-xl border border-cyan-400/50 bg-cyan-500/10 px-4 py-2 text-sm text-cyan-200"
      >
        開始麥克風
      </button>
      <label class="mb-2 block text-sm text-slate-400">
        門檻（RMS）
        <span id="th-label" class="text-lime-400">0.05</span>
      </label>
      <input id="threshold" type="range" min="1" max="80" value="20" class="mb-4 w-full accent-cyan-400" />
      <p class="font-mono text-sm">目前 RMS：<span id="rms" class="text-cyan-300">0</span></p>
    </div>
    <script>
      let audioCtx;
      let analyser;
      let dataArray;

      function computeRms(timeData) {
        let sum = 0;
        const n = timeData.length;
        for (let i = 0; i < n; i++) {
          const v = (timeData[i] - 128) / 128;
          sum += v * v;
        }
        return Math.sqrt(sum / n);
      }

      const page = document.getElementById("page");
      const slider = document.getElementById("threshold");
      const thLabel = document.getElementById("th-label");
      const rmsEl = document.getElementById("rms");

      function thresholdRms() {
        return parseInt(slider.value, 10) / 400;
      }

      function loop() {
        if (!analyser) return;
        analyser.getByteTimeDomainData(dataArray);
        const rms = computeRms(dataArray);
        const th = thresholdRms();
        thLabel.textContent = th.toFixed(3);
        rmsEl.textContent = rms.toFixed(4);
        if (rms > th) {
          page.className = "min-h-screen bg-red-900/70 p-6 text-slate-100";
        } else {
          page.className = "min-h-screen bg-green-900/50 p-6 text-slate-100";
        }
        requestAnimationFrame(loop);
      }

      document.getElementById("start").addEventListener("click", async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext();
        const src = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        dataArray = new Uint8Array(analyser.fftSize);
        src.connect(analyser);
        loop();
      });
    </script>
  </body>
</html>
