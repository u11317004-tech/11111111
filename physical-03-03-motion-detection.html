<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>03-03 動態警報器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      body { font-family: Inter, sans-serif; }
      #alarm { animation: pulse 0.6s ease-in-out infinite alternate; }
      @keyframes pulse { from { opacity: 0.85; } to { opacity: 1; } }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 p-6 text-slate-100">
    <a class="text-cyan-400 hover:text-lime-400" href="index.html">← 返回課程表</a>
    <div class="mx-auto mt-6 max-w-3xl">
      <h1 class="mb-4 text-xl font-semibold">練習 03-03｜影格差異警報</h1>
      <p class="mb-2 text-sm text-slate-400">
        亮度差 &gt; 30 的像素占比 &gt; 10% 時觸發警報（可降採樣每 2 幀分析一次）。
      </p>
      <button id="start" class="mb-4 rounded-xl border border-cyan-400/50 bg-cyan-500/10 px-4 py-2 text-sm text-cyan-200">
        開啟攝影機
      </button>
      <div class="relative inline-block">
        <video id="video" class="hidden" playsinline muted></video>
        <canvas id="canvas" class="max-h-[70vh] rounded-lg border border-cyan-500/30 bg-black"></canvas>
      </div>
      <p id="stat" class="mt-4 font-mono text-sm text-slate-400"></p>
      <div
        id="alarm"
        class="pointer-events-none fixed inset-0 z-40 hidden items-center justify-center bg-red-600/40 backdrop-blur-sm"
      >
        <span class="text-4xl font-bold text-red-100 drop-shadow-lg">偵測到明顯動態！</span>
      </div>
    </div>
    <script>
      const DIFF = 30;
      const RATIO = 0.1;
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const stat = document.getElementById("stat");
      const alarm = document.getElementById("alarm");
      let prevGray = null;
      let frameSkip = 0;

      function toGrayBuffer(imageData) {
        const d = imageData.data;
        const out = new Uint8Array(imageData.width * imageData.height);
        let j = 0;
        for (let i = 0; i < d.length; i += 4) {
          out[j++] = (d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114) | 0;
        }
        return out;
      }

      function loop() {
        requestAnimationFrame(loop);
        if (!video.videoWidth) return;
        frameSkip++;
        if (frameSkip % 2 !== 0) {
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          return;
        }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const gray = toGrayBuffer(img);
        const total = gray.length;
        if (!prevGray || prevGray.length !== total) {
          prevGray = gray;
          return;
        }
        let diffCount = 0;
        for (let i = 0; i < total; i++) {
          if (Math.abs(gray[i] - prevGray[i]) > DIFF) diffCount++;
        }
        prevGray = gray;
        const ratio = diffCount / total;
        stat.textContent =
          "差異像素占比：" + (ratio * 100).toFixed(2) + "%（門檻 " + RATIO * 100 + "%）";
        if (ratio > RATIO) {
          alarm.classList.remove("hidden");
          alarm.classList.add("flex");
        } else {
          alarm.classList.add("hidden");
          alarm.classList.remove("flex");
        }
      }

      document.getElementById("start").addEventListener("click", async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        await video.play();
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        prevGray = null;
        loop();
      });
    </script>
  </body>
</html>
