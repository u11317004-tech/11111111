<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>03-04 AI 舉手感應</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      body { font-family: Inter, sans-serif; }
      #particles { pointer-events: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  </head>
  <body class="min-h-screen bg-slate-950 p-6 text-slate-100">
    <a class="relative z-10 text-cyan-400 hover:text-lime-400" href="index.html">← 返回課程表</a>
    <div class="relative mx-auto mt-6 max-w-3xl">
      <h1 class="mb-4 text-xl font-semibold">練習 03-04｜MediaPipe Pose 舉手粒子</h1>
      <p class="mb-2 text-sm text-slate-400">
        RIGHT_WRIST.y &lt; RIGHT_SHOULDER.y（手腕高於肩膀）時觸發粒子特效。
      </p>
      <button
        id="btn-start"
        type="button"
        class="mb-4 rounded-xl border border-cyan-400/50 bg-cyan-500/10 px-4 py-2 text-sm text-cyan-200 hover:bg-cyan-500/20"
      >
        開始攝影機與姿態偵測
      </button>
      <div class="relative inline-block overflow-hidden rounded-lg border border-cyan-500/30">
        <video id="video" class="sr-only" playsinline></video>
        <canvas id="output"></canvas>
        <canvas id="particles" class="absolute left-0 top-0"></canvas>
      </div>
      <p id="hint" class="mt-3 text-sm text-lime-400"></p>
    </div>
    <script>
      const RIGHT_SHOULDER = 12;
      const RIGHT_WRIST = 16;
      const videoEl = document.getElementById("video");
      const canvas = document.getElementById("output");
      const pcanvas = document.getElementById("particles");
      const ctx = canvas.getContext("2d");
      const pctx = pcanvas.getContext("2d");
      const hint = document.getElementById("hint");

      const particles = [];
      function spawn(x, y, w, h) {
        for (let i = 0; i < 8; i++) {
          particles.push({
            x: x + Math.random() * w,
            y: y + Math.random() * h,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.8) * 6,
            life: 1,
            hue: Math.random() > 0.5 ? 180 : 90,
          });
        }
      }

      function tickParticles() {
        pctx.clearRect(0, 0, pcanvas.width, pcanvas.height);
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.15;
          p.life -= 0.02;
          if (p.life <= 0) {
            particles.splice(i, 1);
            continue;
          }
          pctx.fillStyle = "hsla(" + p.hue + ",100%,60%," + p.life + ")";
          pctx.beginPath();
          pctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
          pctx.fill();
        }
      }

      const pose = new Pose({
        locateFile: (file) =>
          "https://cdn.jsdelivr.net/npm/@mediapipe/pose/" + file,
      });
      pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });

      pose.onResults((results) => {
        if (videoEl.videoWidth && (canvas.width !== videoEl.videoWidth || canvas.height !== videoEl.videoHeight)) {
          canvas.width = videoEl.videoWidth;
          canvas.height = videoEl.videoHeight;
          pcanvas.width = canvas.width;
          pcanvas.height = canvas.height;
        }
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        if (results.poseLandmarks) {
          const lm = results.poseLandmarks;
          const rs = lm[RIGHT_SHOULDER];
          const rw = lm[RIGHT_WRIST];
          const px = rw.x * canvas.width;
          const py = rw.y * canvas.height;
          if (rw.y < rs.y) {
            hint.textContent = "舉手偵測中 — 粒子啟動";
            spawn(px - 40, py - 40, 80, 80);
          } else {
            hint.textContent = "請舉起右手腕高於肩膀";
          }
        }
        ctx.restore();
        tickParticles();
      });

      const camera = new Camera(videoEl, {
        onFrame: async () => {
          await pose.send({ image: videoEl });
        },
        width: 640,
        height: 480,
      });

      document.getElementById("btn-start").addEventListener("click", () => {
        camera.start();
      });
    </script>
  </body>
</html>
