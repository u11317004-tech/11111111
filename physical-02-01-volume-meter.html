<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>02-01 音量計</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      body { font-family: Inter, sans-serif; }
      #meter-fill {
        transform-origin: left center;
        transition: transform 0.12s ease-out;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 p-6 text-slate-100">
    <a class="text-cyan-400 hover:text-lime-400" href="index.html">← 返回課程表</a>
    <div class="mx-auto mt-8 max-w-lg">
      <h1 class="mb-4 text-xl font-semibold">練習 02-01｜音量計（RMS）</h1>
      <button
        id="start"
        class="mb-6 rounded-xl border border-cyan-400/50 bg-cyan-500/10 px-4 py-2 text-sm text-cyan-200 hover:bg-cyan-500/20"
      >
        開始麥克風
      </button>
      <p class="mb-2 text-sm text-slate-400">RMS（均方根）</p>
      <p id="rms-val" class="mb-4 font-mono text-2xl text-lime-400">0.000</p>
      <div class="h-4 w-full overflow-hidden rounded-full bg-slate-800 ring-1 ring-cyan-500/30">
        <div
          id="meter-fill"
          class="h-full w-full scale-x-0 rounded-full bg-gradient-to-r from-cyan-500 to-lime-400"
        ></div>
      </div>
    </div>
    <script>
      let audioCtx;
      let analyser;
      let dataArray;
      const meterFill = document.getElementById("meter-fill");
      const rmsVal = document.getElementById("rms-val");

      function computeRms(timeData) {
        let sum = 0;
        const n = timeData.length;
        for (let i = 0; i < n; i++) {
          const v = (timeData[i] - 128) / 128;
          sum += v * v;
        }
        return Math.sqrt(sum / n);
      }

      function loop() {
        if (!analyser) return;
        analyser.getByteTimeDomainData(dataArray);
        const rms = computeRms(dataArray);
        rmsVal.textContent = rms.toFixed(3);
        const scaled = Math.min(1, rms * 4);
        meterFill.style.transform = "scaleX(" + scaled + ")";
        requestAnimationFrame(loop);
      }

      document.getElementById("start").addEventListener("click", async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext();
        const src = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        dataArray = new Uint8Array(analyser.fftSize);
        src.connect(analyser);
        loop();
      });
    </script>
  </body>
</html>
