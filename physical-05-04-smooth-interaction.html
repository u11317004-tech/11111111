<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>05-04 平滑互動</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/gh/jcmellado/js-aruco@master/src/cv.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jcmellado/js-aruco@master/src/aruco.js"></script>
    <style>body { font-family: Inter, sans-serif; }</style>
  </head>
  <body class="min-h-screen bg-slate-950 p-6 text-slate-100">
    <a class="text-cyan-400 hover:text-lime-400" href="index.html">← 返回課程表</a>
    <div class="mx-auto mt-6 max-w-4xl">
      <h1 class="mb-4 text-xl font-semibold">練習 05-04｜移動平均（最近 10 筆）</h1>
      <button id="start" class="mb-4 rounded-xl border border-cyan-400/50 bg-cyan-500/10 px-4 py-2 text-sm text-cyan-200">
        開啟攝影機
      </button>
      <div class="relative inline-block">
        <video id="video" class="hidden" playsinline muted></video>
        <canvas id="canvas" class="max-h-[70vh] rounded-lg border border-cyan-500/30 bg-black"></canvas>
      </div>
      <p class="mt-2 font-mono text-xs text-slate-500">紅點：原始中心　青點：平滑後中心　線段連接固定參考點與平滑點</p>
    </div>
    <script>
      const N = 10;
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const detector = new AR.Detector();
      const history = [];

      function centerOf(m) {
        let sx = 0,
          sy = 0;
        for (let i = 0; i < m.corners.length; i++) {
          sx += m.corners[i].x;
          sy += m.corners[i].y;
        }
        return { x: sx / 4, y: sy / 4 };
      }

      function smooth() {
        if (!history.length) return null;
        let sx = 0,
          sy = 0;
        history.forEach((p) => {
          sx += p.x;
          sy += p.y;
        });
        return { x: sx / history.length, y: sy / history.length };
      }

      function loop() {
        requestAnimationFrame(loop);
        if (video.readyState < video.HAVE_CURRENT_DATA) return;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const markers = detector.detect(img);
        const ref = { x: 40, y: canvas.height * 0.5 };
        ctx.fillStyle = "#64748b";
        ctx.beginPath();
        ctx.arc(ref.x, ref.y, 6, 0, Math.PI * 2);
        ctx.fill();

        if (markers.length) {
          const raw = centerOf(markers[0]);
          history.push({ x: raw.x, y: raw.y });
          if (history.length > N) history.shift();
          const sm = smooth();
          ctx.fillStyle = "#f87171";
          ctx.beginPath();
          ctx.arc(raw.x, raw.y, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#22d3ee";
          ctx.beginPath();
          ctx.arc(sm.x, sm.y, 7, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#a3e635";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(ref.x, ref.y);
          ctx.lineTo(sm.x, sm.y);
          ctx.stroke();
        }
      }

      document.getElementById("start").addEventListener("click", async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        await video.play();
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        history.length = 0;
        loop();
      });
    </script>
  </body>
</html>
